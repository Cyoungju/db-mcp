spring:
  datasource:
    url: jdbc:mysql://localhost:3308/mcpdb
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  ai:
    mcp:
      server:
        stdio: true
        name: db-assistant